<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#8237BE" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0B1142" media="(prefers-color-scheme: dark)" />
    <title>Offline — Ascendra</title>
    <style>
      :root {
        --bg: #f5f5f5;
        --fg: #0b1142;
        --muted: #64748b;
        --card: #ffffff;
        --primary: #8237be;
        --primary-dim: rgba(130, 55, 190, 0.12);
        --border: rgba(15, 23, 42, 0.1);
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0b1142;
          --fg: #f1f5f9;
          --muted: #94a3b8;
          --card: #111827;
          --primary: #a78bfa;
          --primary-dim: rgba(167, 139, 250, 0.15);
          --border: rgba(248, 250, 252, 0.12);
        }
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        min-height: 100%;
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        background: var(--bg);
        color: var(--fg);
        -webkit-font-smoothing: antialiased;
      }
      body {
        padding: max(1.25rem, env(safe-area-inset-top, 0px)) max(1.25rem, env(safe-area-inset-right, 0px))
          max(1.5rem, env(safe-area-inset-bottom, 0px)) max(1.25rem, env(safe-area-inset-left, 0px));
        display: flex;
        align-items: center;
        justify-content: center;
      }
      main {
        width: 100%;
        max-width: 22rem;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 1rem;
        padding: 1.5rem 1.25rem;
        box-shadow: 0 12px 40px rgba(15, 23, 42, 0.08);
      }
      @media (prefers-color-scheme: dark) {
        main {
          box-shadow: 0 12px 40px rgba(0, 0, 0, 0.35);
        }
      }
      .badge {
        display: inline-flex;
        align-items: center;
        gap: 0.35rem;
        font-size: 0.7rem;
        font-weight: 600;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--primary);
        background: var(--primary-dim);
        padding: 0.35rem 0.65rem;
        border-radius: 9999px;
        margin-bottom: 0.75rem;
      }
      h1 {
        font-size: 1.25rem;
        font-weight: 700;
        line-height: 1.3;
        margin: 0 0 0.5rem;
      }
      p {
        font-size: 0.9rem;
        line-height: 1.5;
        color: var(--muted);
        margin: 0 0 1.25rem;
      }
      button {
        width: 100%;
        appearance: none;
        border: none;
        border-radius: 0.625rem;
        padding: 0.75rem 1rem;
        font-size: 0.9rem;
        font-weight: 600;
        color: #fff;
        background: linear-gradient(135deg, #8237be, #6d28d9);
        cursor: pointer;
        min-height: 48px;
      }
      @media (prefers-color-scheme: dark) {
        button {
          background: linear-gradient(135deg, #8b5cf6, #7c3aed);
        }
      }
      button:active {
        opacity: 0.92;
        transform: scale(0.99);
      }
    </style>
  </head>
  <body>
    <main>
      <div class="badge" aria-hidden="true">● No connection</div>
      <h1>You're offline</h1>
      <p>Check your network, then try again. Pages you’ve opened before may still load from the app cache.</p>
      <button type="button" id="retry">Try again</button>
    </main>
    <script>
      document.getElementById("retry")?.addEventListener("click", function () {
        window.location.reload();
      });
    </script>
  </body>
</html>
